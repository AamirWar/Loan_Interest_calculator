<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loan Interest Calculator</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>Loan Interest Calculator</h1>
        <div class="fields">
            <label for="pamt">Principle Amount</label>
            <br>
            <input type="number" id="pamt" min="1" placeholder="&#8377">
        </div>
        <div class="fields">
            <label for="roi">Rate of Interest</label>
            <br>
            <input type="number" id="roi" min="0" placeholder="%">
        </div>
        <div class="fields">
            <label for="time">Time Period</label>
            <br>
            <input type="number" id="time" min="1" placeholder="Years">
        </div>
        <div class="btfields">
            <button type="button" id="bt">Calculate Amount</button>
        </div>
        <div class="opfields">
            <output id="op"></output>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
